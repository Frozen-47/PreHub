<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>Placement Prep Projects Dashboard | Sabareesh GanesaMoorthi</title>
  
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>

  <meta name="title" content="Placement Prep Projects Dashboard | Sabareesh GanesaMoorthi" />
  <meta name="description" content="Centralized project launcher and code inspector showcasing 8 development works completed as placement preparation. Developed by Sabareesh GanesaMoorthi." />
  <meta name="author" content="Sabareesh GanesaMoorthi" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark light" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
