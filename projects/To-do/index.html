<!DOCTYPE html>
<html>
<head>
    <title>To-Do APP</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        margin-left: 25%;
        margin-top: 15%;
    }
    h1 {
        color: #363636;
    }
    p {
        font-size: 18px;
        display: inline-block;
    }
    input[type="text"] {
        padding: 10px;
        width: 300px;
        margin-right: 10px;
    }
    button {
        padding: 10px 20px;
        background-color: #353535;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }
    button:hover {
        background-color: #424242;
    }
    ul {
        list-style-type: none;
        padding: 0;
        margin-top: 20px;
        display: inline-block
    }
    li {
        padding: 10px;
        background-color: #f8f9fa;
        margin-bottom: 5px;
        border: 1px solid #ddd;
        border-radius: 5px;
        display: inline-block;
    }

    </style>
</head>
<body>

<h1>To-Do APP</h1>
<p>Task: <input type="text" id="taskInput" placeholder="Enter a task"></p>
<button onclick="addTask()">Add Task</button>
<button onclick="clearTasks()">Clear Tasks</button>
<br>
<ul id="taskList">
</ul>

<script src="script.js"></script>
</body>
</html>
